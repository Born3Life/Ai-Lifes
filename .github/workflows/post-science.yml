name: Post Science
on:
  schedule:
    - cron: "0 9 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      NG_GEMINI_KEY: ${{ secrets.NG_GEMINI_KEY }}
      NG_TG_TOKEN_SCIENCE: ${{ secrets.NG_TG_TOKEN_SCIENCE }}
      NG_TG_CHANNEL_SCIENCE: ${{ secrets.NG_TG_CHANNEL_SCIENCE }}
      NG_VK_TOKEN_SCIENCE: ${{ secrets.NG_VK_TOKEN_SCIENCE }}
      NG_VK_GROUP_SCIENCE: ${{ secrets.NG_VK_GROUP_SCIENCE }}
      NG_HF_TOKEN: ${{ secrets.NG_HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            history_science.json
            posted_science.json
            topics_log_science.json
            used_rss_science.json
            rss_archive_science.json
          key: neuro-state-science
          save-always: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install Pillow
      - run: python neuro.py --channel science