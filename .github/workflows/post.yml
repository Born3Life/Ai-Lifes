name: Post to TG and VK
on:
  schedule:
    - cron: "0 5 * * *"
    - cron: "0 10 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: Post slot
        required: false
        default: ""
        type: string

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      NG_GEMINI_KEY: ${{ secrets.NG_GEMINI_KEY }}
      NG_TG_TOKEN: ${{ secrets.NG_TG_TOKEN }}
      NG_TG_CHANNEL: ${{ secrets.NG_TG_CHANNEL }}
      NG_VK_TOKEN: ${{ secrets.NG_VK_TOKEN }}
      NG_VK_GROUP: ${{ secrets.NG_VK_GROUP }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Debug Gemini API
        env:
          KEY: ${{ secrets.NG_GEMINI_KEY }}
        run: |
          python -c "
import json, urllib.request, ssl, os
ctx = ssl._create_unverified_context()
key = os.environ['KEY']
print('KEY length:', len(key), 'prefix:', key[:4])
url = 'https://generativelanguage.googleapis.com/v1beta/models?key=' + key
try:
    with urllib.request.urlopen(url, context=ctx, timeout=15) as r:
        print('Models:', r.read().decode()[:1000])
except Exception as e:
    print('Error:', e)
    if hasattr(e, 'read'):
        print('Body:', e.read().decode()[:500])
url2 = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + key
body = json.dumps({'contents':[{'parts':[{'text':'hi'}]}]}).encode()
try:
    with urllib.request.urlopen(urllib.request.Request(url2, data=body, headers={'Content-Type':'application/json'}, method='POST'), context=ctx, timeout=15) as r:
        print('Generate:', r.read().decode()[:500])
except Exception as e:
    print('Generate Error:', e)
    if hasattr(e, 'read'):
        print('Body:', e.read().decode()[:500])
"
      - run: python neuro.py --once ${{ inputs.slot || '' }}
