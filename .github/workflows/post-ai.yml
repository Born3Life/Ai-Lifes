name: Post AI
on:
  schedule:
    - cron: "0 7 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      NG_GEMINI_KEY: ${{ secrets.NG_GEMINI_KEY }}
      NG_TG_TOKEN: ${{ secrets.NG_TG_TOKEN }}
      NG_TG_CHANNEL: ${{ secrets.NG_TG_CHANNEL }}
      NG_VK_TOKEN: ${{ secrets.NG_VK_TOKEN }}
      NG_VK_GROUP: ${{ secrets.NG_VK_GROUP }}
      NG_HF_TOKEN: ${{ secrets.NG_HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            history_ai.json
            posted_ai.json
            topics_log_ai.json
            used_rss_ai.json
            rss_archive_ai.json
          key: neuro-state-ai
          save-always: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install Pillow
      - run: python neuro.py --channel ai